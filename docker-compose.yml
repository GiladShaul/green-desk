services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: greendesk
      POSTGRES_USER: greendesk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greendesk"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://greendesk:${POSTGRES_PASSWORD:-changeme}@db:5432/greendesk
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-Green Desk <noreply@greendesk.local>}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      PORT: 3001
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - api

volumes:
  postgres_data:
