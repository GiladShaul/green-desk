# Fly.io configuration for the Green Desk Web frontend (nginx + React SPA)
# Deploy: flyctl deploy --config fly.web.toml
# First deploy: flyctl launch --config fly.web.toml --no-deploy (to create the app)

app = 'green-desk-web'
primary_region = 'iad'

[build]
  dockerfile = 'packages/web/Dockerfile'

[env]
  # Routes nginx proxy to the API over Fly.io's private network.
  # Matches the app name set in fly.api.toml.
  API_HOST = 'green-desk-api.internal:3001'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = '10s'
    interval = '15s'
    method = 'GET'
    path = '/'
    timeout = '5s'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
