name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: greendesk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/greendesk_test
      JWT_SECRET: ci-test-secret-not-for-production
      JWT_EXPIRES_IN: 1h
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check API
        run: npx tsc --noEmit -p packages/api/tsconfig.json

      - name: Type-check Web
        run: npx tsc --noEmit -p packages/web/tsconfig.json

      - name: Run unit tests
        run: npm test -w packages/api

      - name: Run integration tests
        run: npm run test:integration -w packages/api

      - name: Run frontend tests
        run: npm test -w packages/web

      - name: Build web frontend
        run: npm run build -w packages/web

      - name: Build API Docker image
        run: docker build -f packages/api/Dockerfile -t green-desk-api:ci .

      - name: Build web Docker image
        run: docker build -f packages/web/Dockerfile -t green-desk-web:ci .

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: greendesk_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/greendesk_e2e
      JWT_SECRET: ci-e2e-secret-not-for-production
      JWT_EXPIRES_IN: 7d
      NODE_ENV: test
      CI: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build API (for migrations)
        run: npm run build -w packages/api

      - name: Run database migrations
        run: node packages/api/dist/migrate.js

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [test, e2e]
    # Only deploy from main branch pushes (not PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_API" ]; then
            echo "Deploying API..."
            curl -sf -X POST "$RENDER_DEPLOY_HOOK_API"
          else
            echo "RENDER_DEPLOY_HOOK_API not set — skipping API deploy"
            echo "See docs/render-deploy.md §6 to configure deploy hooks"
          fi
          if [ -n "$RENDER_DEPLOY_HOOK_WEB" ]; then
            echo "Deploying Web..."
            curl -sf -X POST "$RENDER_DEPLOY_HOOK_WEB"
          else
            echo "RENDER_DEPLOY_HOOK_WEB not set — skipping Web deploy"
          fi
        env:
          RENDER_DEPLOY_HOOK_API: ${{ secrets.RENDER_DEPLOY_HOOK_API }}
          RENDER_DEPLOY_HOOK_WEB: ${{ secrets.RENDER_DEPLOY_HOOK_WEB }}
