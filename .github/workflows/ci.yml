name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: greendesk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/greendesk_test
      JWT_SECRET: ci-test-secret-not-for-production
      JWT_EXPIRES_IN: 1h
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check API
        run: npx tsc --noEmit -p packages/api/tsconfig.json

      - name: Type-check Web
        run: npx tsc --noEmit -p packages/web/tsconfig.json

      - name: Run unit tests
        run: npm test -w packages/api

      - name: Run integration tests
        run: npm run test:integration -w packages/api

      - name: Build web frontend
        run: npm run build -w packages/web

      - name: Build API Docker image
        run: docker build -f packages/api/Dockerfile -t green-desk-api:ci .

      - name: Build web Docker image
        run: docker build -f packages/web/Dockerfile -t green-desk-web:ci .
